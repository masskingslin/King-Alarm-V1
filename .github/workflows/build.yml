name: Build Crown Bible APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install packages
        run: |
          npm install -g @capacitor/cli@6.2.0
          npm install \
            @capacitor/core@6.2.0 \
            @capacitor/android@6.2.0 \
            @capacitor-community/text-to-speech@4.0.0 \
            @capacitor-community/admob@6.0.0

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi

      - name: Sync Capacitor
        run: cap sync android

      # ── Copy King Bible icons into correct Android mipmap folders ──
      - name: Apply custom app icon
        run: |
          echo "Applying King Bible App icons..."
          declare -A SIZES=(
            ["mdpi"]="48"
            ["hdpi"]="72"
            ["xhdpi"]="96"
            ["xxhdpi"]="144"
            ["xxxhdpi"]="192"
          )
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            # Try both folder name formats Capacitor may use
            for dir in \
              "android/app/src/main/res/mipmap-${density}" \
              "android/app/src/main/res/mipmap-${density}-v4"; do
              if [ -d "$dir" ]; then
                src="public/icons/icon_${density}.png"
                if [ -f "$src" ]; then
                  cp "$src" "$dir/ic_launcher.png"
                  cp "$src" "$dir/ic_launcher_round.png"
                  echo "  Copied $density → $dir"
                fi
              fi
            done
          done
          echo "Icons applied."

      # ── Inject AdMob App ID into AndroidManifest ──
      - name: Inject AdMob App ID
        run: |
          python3 << 'PYEOF'
          with open("android/app/src/main/AndroidManifest.xml","r") as f:
              content = f.read()
          if "APPLICATION_ID" not in content:
              content = content.replace(
                  'android:theme="@style/AppTheme">',
                  'android:theme="@style/AppTheme">\n        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9057426786910647~7730878522"/>'
              )
              with open("android/app/src/main/AndroidManifest.xml","w") as f:
                  f.write(content)
              print("AdMob ID injected")
          else:
              print("AdMob ID already present")
          PYEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find . -name "*.apk" | head -3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrownBible-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30