name: Build Crown Bible APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Cache Gradle ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 5. Install npm packages ────────────────────────────────────────────
      - name: Install npm packages
        run: npm install

      # ── 6. FIX: Add Android platform if not present ───────────────────────
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "android/ folder missing — running cap add android"
            npx cap add android
          else
            echo "android/ folder exists — skipping cap add"
          fi

      # ── 7. Capacitor sync ─────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          echo "=== APK output ==="
          find . -name "*.apk" | head -5

      # ── 9. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrownBible-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30