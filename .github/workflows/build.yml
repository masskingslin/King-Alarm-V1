name: Build Crown Bible APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install packages
        run: |
          npm install -g @capacitor/cli@6.2.0
          npm install \
            @capacitor/core@6.2.0 \
            @capacitor/android@6.2.0 \
            @capacitor-community/text-to-speech@4.0.0 \
            @capacitor-community/admob@6.0.0

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi

      - name: Sync Capacitor
        run: cap sync android

      # Inject AdMob App ID into AndroidManifest.xml
      - name: Inject AdMob App ID into manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          ADMOB_ID="ca-app-pub-9057426786910647~7730878522"
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
            sed -i "s|<application|<application>\\n        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$ADMOB_ID\"/>|" "$MANIFEST" || true
            # Alternative approach if sed fails
            python3 - << 'PYEOF'
          import re
          with open("android/app/src/main/AndroidManifest.xml","r") as f:
              content = f.read()
          if "APPLICATION_ID" not in content:
              content = content.replace(
                  '<application',
                  '<application\n        android:usesCleartextTraffic="false"',
                  1
              )
              # Insert meta-data after <application tag closes
              content = content.replace(
                  'android:theme="@style/AppTheme">',
                  'android:theme="@style/AppTheme">\n        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9057426786910647~7730878522"/>'
              )
              with open("android/app/src/main/AndroidManifest.xml","w") as f:
                  f.write(content)
              print("AdMob APP ID injected into manifest")
          else:
              print("AdMob APP ID already in manifest")
          PYEOF
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find . -name "*.apk" | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrownBible-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30