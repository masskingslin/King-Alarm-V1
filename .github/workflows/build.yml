name: Build Crown Bible APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install packages
        run: |
          npm install -g @capacitor/cli@6.2.0
          npm install \
            @capacitor/core@6.2.0 \
            @capacitor/android@6.2.0 \
            @capacitor-community/text-to-speech@4.0.0 \
            @capacitor-community/admob@6.0.0

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi

      - name: Sync Capacitor
        run: cap sync android

      # Copy King Bible icons into Android mipmap folders
      - name: Install Pillow
        run: pip install Pillow --break-system-packages

      - name: Apply custom app icon
        run: |
          python3 << 'PYEOF'
          import os, shutil
          from PIL import Image

          # Source icon - user's King Bible logo
          src = None
          for p in [
            'public/icons/ic_launcher_xxxhdpi.png',
            'public/icons/icon_xxxhdpi.png',
            'public/icons/icon_xxhdpi.png',
          ]:
            if os.path.exists(p):
              src = p
              break

          if not src:
            print("No icon found in public/icons/ - using default")
            exit(0)

          print(f"Using icon: {src}")
          img = Image.open(src).convert('RGBA')
          w, h = img.size
          side = min(w,h)
          img = img.crop(((w-side)//2, (h-side)//2, (w+side)//2, (h+side)//2))

          sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}

          for density, size in sizes.items():
            resized = img.resize((size,size), Image.LANCZOS)
            for folder in [
              f'android/app/src/main/res/mipmap-{density}',
              f'android/app/src/main/res/mipmap-{density}-v4',
            ]:
              if os.path.isdir(folder):
                for name in ['ic_launcher.png','ic_launcher_round.png','ic_launcher_foreground.png']:
                  out = os.path.join(folder, name)
                  resized.save(out,'PNG')
                print(f"  Applied {density} ({size}x{size}) -> {folder}")
          print("Icons applied.")
          PYEOF

      # Inject AdMob App ID into AndroidManifest
      - name: Inject AdMob App ID
        run: |
          python3 << 'PYEOF'
          with open("android/app/src/main/AndroidManifest.xml","r") as f:
              c = f.read()
          if "APPLICATION_ID" not in c:
              c = c.replace(
                  'android:theme="@style/AppTheme">',
                  'android:theme="@style/AppTheme">\n        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9057426786910647~7730878522"/>'
              )
              with open("android/app/src/main/AndroidManifest.xml","w") as f:
                  f.write(c)
              print("AdMob ID injected")
          else:
              print("AdMob ID already present")
          PYEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find . -name "*.apk" | head -3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrownBible-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30