name: 🙏 Build Bible App APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ⚛️ Build React App
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: ⚡ Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: ➕ Add Android Platform
        run: npx cap add android || true

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔧 Fix Gradlew Permission
        run: chmod +x android/gradlew

      - name: 🛠️ Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 🚀 Build Signed Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ../bible.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../bible.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BibleApp-APK-Build-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: ✅ Build Summary
        run: |
          echo "## 🙏 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Info |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | வேத வசனம் Bible |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download APK from Artifacts section below**" >> $GITHUB_STEP_SUMMARY