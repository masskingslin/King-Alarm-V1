<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080810"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>வேத வசனம் Holy Bible</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080f;--bg2:#111120;--bg3:#1a1a2e;--bg4:#24243c;
  --brd:rgba(200,180,130,.1);--txt:#e8dcc8;--txt2:rgba(232,220,200,.5);
  --txt3:rgba(232,220,200,.18);--gold:#c9a84c;--acc:#0066cc;
  --ta:'Noto Serif Tamil',serif;--ta2:'Noto Sans Tamil',sans-serif;
  --en:'EB Garamond','Georgia',serif;--sans:'Barlow Condensed','Arial Narrow',sans-serif;
  --nav:56px;--hdr:50px;
}
[data-light]{--bg:#f0ead8;--bg2:#f8f4e8;--bg3:#ede4cc;--bg4:#e0d5b8;--brd:rgba(100,80,40,.15);--txt:#1a1005;--txt2:rgba(26,16,5,.5);--txt3:rgba(26,16,5,.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--ta2);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
button:active{opacity:.7}input{font-family:inherit;outline:none}::-webkit-scrollbar{display:none}
/* SHELL */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;overflow:hidden}
#hdr{flex-shrink:0;height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:50}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#nav{flex-shrink:0;height:var(--nav);background:var(--bg2);border-top:1px solid var(--gold);display:flex;overflow-x:auto}
/* LOADING — FIX 2 & 7 */
#ls{position:fixed;inset:0;z-index:999;background:#040408;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ls-img{width:90px;height:90px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;animation:lsglow 2s ease-in-out infinite alternate}
@keyframes lsglow{from{box-shadow:0 0 10px rgba(201,168,76,.3)}to{box-shadow:0 0 28px rgba(201,168,76,.7)}}
.ls-title{font-size:20px;letter-spacing:6px;color:#e8dcc8;font-family:var(--sans);font-weight:700}
.ls-sub{font-size:9px;color:rgba(232,220,200,.4);letter-spacing:2px;font-family:var(--sans)}
.ls-track{width:200px;height:3px;background:rgba(201,168,76,.15);border-radius:2px;overflow:hidden}
.ls-bar{height:100%;background:var(--gold);width:0%;transition:width .4s ease;border-radius:2px}
.ls-msg{font-size:10px;color:rgba(232,220,200,.5);letter-spacing:1px;font-family:var(--sans)}
/* FIX 7: error message */
.ls-err{display:none;font-size:10px;color:#ff6b6b;text-align:center;line-height:1.9;font-family:var(--sans);padding:0 30px}
/* PUSH BANNER */
#pn-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:998;max-width:480px;margin:0 auto;background:linear-gradient(135deg,#0d2040,#1a3a6a);border-bottom:2px solid var(--gold);padding:12px 14px;animation:slidedown .3s ease}
@keyframes slidedown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.pn-inner{display:flex;align-items:flex-start;gap:12px}
.pn-ico{font-size:22px;flex-shrink:0}
.pn-title{font-size:13px;font-weight:700;color:#fff;font-family:var(--sans)}
.pn-body{font-size:12px;color:rgba(255,255,255,.75);font-family:var(--ta2);margin-top:3px;line-height:1.5}
.pn-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;font-size:14px;border-radius:4px;flex-shrink:0;cursor:pointer}
/* HEADER */
.hbrand{display:flex;align-items:center;gap:10px}
.hico{width:34px;height:34px;border-radius:8px;object-fit:cover;border:1px solid var(--gold)}
.htit{font-size:12px;letter-spacing:3px;font-weight:700;color:var(--txt);font-family:var(--sans)}
.hsub{font-size:7px;letter-spacing:1px;color:var(--txt3);margin-top:1px;font-family:var(--sans)}
.hbtns{display:flex;gap:5px}
.hbtn{background:transparent;border:1px solid var(--brd);color:var(--txt2);width:32px;height:28px;font-size:11px;font-weight:700;font-family:var(--sans)}
/* NAV */
.nb{flex:1;min-width:48px;border:none;background:transparent;color:var(--txt3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.nb.on{color:var(--gold);border-top:2px solid var(--gold);background:rgba(201,168,76,.05)}
.ni{font-size:16px;line-height:1}.nl{font-size:7px;font-weight:700;letter-spacing:.3px;font-family:var(--sans)}
/* SCREENS */
.scr{display:none}.scr.on{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* TILES */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px}
.tile{padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:88px;cursor:pointer;overflow:hidden;position:relative}
.tile.w2{grid-column:1/3;min-height:130px}.tile.clk{grid-column:1/3;min-height:100px;cursor:default}
.ct{font-size:40px;font-weight:200;color:#fff;letter-spacing:-3px;line-height:1;font-family:var(--sans)}
.cd{font-size:10px;color:rgba(255,255,255,.6);margin-top:6px;font-family:var(--sans)}
.dtag{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-bottom:6px;font-family:var(--sans)}
.dta{font-size:13px;color:#fff;line-height:1.85;font-family:var(--ta);margin-bottom:4px}
.den{font-size:12px;color:rgba(255,255,255,.75);line-height:1.7;font-family:var(--en);font-style:italic;margin-bottom:8px}
.dref{font-size:9px;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:10px;font-family:var(--sans)}
.dbtns{display:flex;gap:5px}.dbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;font-size:8px;font-weight:700;font-family:var(--sans)}
.ttl{font-size:13px;font-weight:700;color:#fff;font-family:var(--sans)}.tts{font-size:9px;color:rgba(255,255,255,.5);margin-top:3px;font-family:var(--sans)}
/* SECTION HDR */
.sh{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.sht{font-size:8px;letter-spacing:3px;font-weight:700;color:var(--txt2);font-family:var(--sans)}
/* VERSE CARD */
.vc{background:var(--bg2);border-bottom:1px solid var(--brd)}
.vch{padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
.vr{font-size:10px;font-weight:700;color:#fff;letter-spacing:.5px;font-family:var(--sans)}.vbk{font-size:9px;color:rgba(255,255,255,.5);font-family:var(--ta2)}
.vbd{padding:11px 14px}
.vta{font-size:15px;line-height:2.0;color:var(--txt);font-family:var(--ta);margin-bottom:8px}
.ven{font-size:15px;line-height:1.85;color:var(--txt);font-family:var(--en);font-style:italic}
.va{display:flex;gap:2px;margin-top:10px}
.va button{flex:1;padding:7px 2px;border:none;background:var(--bg3);color:var(--txt2);font-size:8px;font-weight:700;border-top:1px solid var(--brd);font-family:var(--sans)}
/* LANG TOGGLE */
.ltog{display:flex;gap:2px;padding:5px 14px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.ltog button{flex:1;padding:7px;border:none;background:var(--bg3);color:var(--txt2);font-size:9px;font-weight:700;font-family:var(--sans)}
.ltog button.on{background:var(--acc);color:#fff}
/* SEARCH */
.sbar{display:flex;border-bottom:1px solid var(--gold)}
.sinp{flex:1;background:var(--bg2);border:none;padding:12px 14px;color:var(--txt);font-size:15px;font-family:var(--en)}
.sinp::placeholder{color:var(--txt3);font-style:italic}
.sbtn{background:var(--gold);border:none;color:#080810;width:44px;font-size:16px;font-weight:700}
.chips{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;border-bottom:1px solid var(--brd)}
.chip{background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);padding:5px 12px;font-size:9px;white-space:nowrap;font-family:var(--sans)}
.chip.on{background:var(--gold);border-color:var(--gold);color:#080810}
/* BOOKS */
.bfilt{display:flex;gap:3px;padding:3px}
.bfilt button{flex:1;padding:8px;border:none;background:var(--bg3);color:var(--txt2);font-size:9px;font-weight:700;font-family:var(--sans)}
.bfilt button.on{background:#0d4a1a;color:#fff}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:0 3px 3px}
.btile{padding:13px 12px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between}
.bne{font-size:12px;color:#fff;font-weight:700;font-family:var(--sans)}.bnt{font-size:11px;color:rgba(255,255,255,.8);font-family:var(--ta2);margin-top:2px}
.bm{font-size:8px;color:rgba(255,255,255,.45);font-family:var(--sans)}
.bbtns{display:flex;gap:3px;margin-top:8px}.bbtns button{flex:1;background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 0;font-size:8px;font-weight:700;font-family:var(--sans)}
/* CHARACTER / STORY TILES */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px}
.ctile{padding:14px;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;position:relative;overflow:hidden}
.cemi{position:absolute;right:8px;top:8px;font-size:30px;opacity:.22}
.cn{font-size:13px;font-weight:700;color:#fff;font-family:var(--sans)}.cnt{font-size:11px;color:rgba(255,255,255,.8);font-family:var(--ta2);margin-top:2px}
.ce{font-size:8px;color:rgba(255,255,255,.45);font-family:var(--sans);margin-top:3px}
.ctl{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--en);font-style:italic;margin-top:4px;line-height:1.4}
.cbtn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px;font-size:8px;font-weight:700;font-family:var(--sans);width:100%;margin-top:7px}
/* OVERLAYS */
.ov{display:none;position:fixed;inset:0;z-index:400;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg)}
.ov.on{display:flex;animation:fu .2s ease}
.ovbar{flex-shrink:0;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.ovbody{flex:1;overflow-y:auto}
/* READING */
.rbar{flex-shrink:0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.rbody{flex:1;overflow-y:auto;padding:32px 22px}
.rta{font-family:var(--ta);line-height:2.2;margin-bottom:24px;color:var(--txt)}
.rdiv{height:1px;width:40px;margin-bottom:24px}
.ren{line-height:1.9;font-style:italic;color:var(--txt);font-family:var(--en)}
.rbadge{display:inline-block;padding:5px 18px;font-size:9px;font-weight:700;letter-spacing:3px;margin-top:20px;font-family:var(--sans)}
.rctls{display:flex;gap:6px}.rcbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:var(--sans);cursor:pointer}
/* CHAPTER READER */
.chbody{flex:1;overflow-y:auto;padding:12px 14px;background:var(--bg)}
.chv{padding:9px 0;border-bottom:1px solid var(--brd);display:flex;gap:12px}
.chvn{font-size:10px;font-weight:700;color:var(--gold);font-family:var(--sans);flex-shrink:0;padding-top:3px;width:28px;text-align:right}
.chvcol{flex:1}
.chvta{font-size:15px;line-height:2.0;color:var(--txt);font-family:var(--ta);margin-bottom:5px}
.chven{font-size:15px;line-height:1.85;color:var(--txt);font-family:var(--en);font-style:italic}
.chnav{display:flex;gap:2px;padding:6px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--brd)}
.chnav button{flex:1;padding:9px;border:none;background:var(--bg3);color:var(--txt2);font-size:9px;font-weight:700;font-family:var(--sans)}
.chnav button.on{background:var(--gold);color:#080810}
.chlb{display:flex;gap:3px;margin-right:4px}
.chlb button{padding:0 8px;height:28px;border:none;background:var(--bg3);color:var(--txt2);font-size:8px;font-weight:700;font-family:var(--sans)}
.chlb button.on{background:var(--acc);color:#fff}
/* AUDIO PANEL — FIX 3 */
#au-panel{display:none;position:fixed;bottom:var(--nav);left:0;right:0;z-index:200;max-width:480px;margin:0 auto}
#au-panel.on{display:block}
.auinner{background:linear-gradient(135deg,#030818,#0a1835);padding:14px;box-shadow:0 -4px 20px rgba(0,0,0,.6);position:relative;border-top:1px solid rgba(100,150,255,.2)}
.aut{font-size:10px;font-weight:700;color:#fff;letter-spacing:2px;font-family:var(--sans);margin-bottom:3px}
.aur{font-size:9px;color:rgba(255,255,255,.4);font-family:var(--sans);margin-bottom:10px}
.aulng{display:flex;gap:3px;margin-bottom:10px}
.aulng button{flex:1;padding:7px;border:none;font-size:9px;font-weight:700;font-family:var(--sans);cursor:pointer}
.auctls{display:flex;gap:4px}
.auctls button{flex:1;padding:9px 4px;border:none;font-size:9px;font-weight:700;font-family:var(--sans);cursor:pointer}
.aucls{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);border:none;color:#fff;width:26px;height:26px;font-size:13px;cursor:pointer}
.aumsg{margin-top:6px;font-size:9px;color:rgba(255,255,255,.45);font-family:var(--sans);line-height:1.6}
/* SONGS */
.song-cat-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.song-cat-t{font-size:13px;font-weight:700;color:#fff;font-family:var(--sans)}
.song-cat-e{font-size:10px;color:rgba(255,255,255,.6);font-family:var(--sans);margin-top:2px}
.song-cat-body{display:none}.song-cat-body.open{display:block}
.song-item{padding:12px 14px;border-bottom:1px solid var(--brd);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.song-num{font-size:10px;color:var(--txt3);font-family:var(--sans);width:22px;flex-shrink:0}
.song-tita{font-size:14px;color:var(--txt);font-family:var(--ta2);flex:1}
.song-tite{font-size:11px;color:var(--txt2);font-family:var(--en);font-style:italic}
.song-lyrics{font-size:16px;line-height:2.2;color:var(--txt);font-family:var(--ta2);white-space:pre-line}
/* STORY / CHAR SECTIONS */
.csec{padding:15px;border-bottom:1px solid var(--brd)}
.csl{font-size:8px;letter-spacing:3px;font-weight:700;color:var(--txt3);font-family:var(--sans);margin-bottom:11px}
.csen{font-size:15px;line-height:1.9;color:var(--txt);font-family:var(--en)}
.csta{font-size:14px;line-height:2.0;color:var(--txt2);font-family:var(--ta2);margin-top:11px}
.kv{background:var(--bg3);border-left:3px solid var(--gold);padding:13px 14px;margin-bottom:8px}
.kvref{font-size:9px;font-weight:700;color:var(--gold);font-family:var(--sans);margin-bottom:7px}
.kven{font-size:15px;line-height:1.85;color:var(--txt);font-family:var(--en);font-style:italic}
.kvta{font-size:14px;line-height:2.0;color:var(--txt2);font-family:var(--ta2);margin-top:8px}
.kvact{display:flex;gap:4px;margin-top:10px}
.kvact button{flex:1;padding:7px;border:none;font-size:8px;font-weight:700;font-family:var(--sans);cursor:pointer}
.tli{display:flex;gap:13px;padding:9px 0;border-bottom:1px solid var(--brd)}.tli:last-child{border-bottom:none}
.tlcol{display:flex;flex-direction:column;align-items:center;gap:4px}
.tldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.tlline{width:1px;background:var(--brd);flex:1}
.tlref{font-size:9px;font-weight:700;font-family:var(--sans);color:rgba(255,255,255,.55);margin-bottom:3px}
.tlen{font-size:14px;line-height:1.6;color:var(--txt);font-family:var(--en)}
.tlta{font-size:13px;line-height:1.8;color:var(--txt2);font-family:var(--ta2);margin-top:3px}
.lesn{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}.lesn:last-child{border-bottom:none}
.lesnn{font-size:22px;font-weight:700;color:var(--gold);font-family:var(--sans);opacity:.4;flex-shrink:0;line-height:1;margin-top:2px}
.lesen{font-size:15px;line-height:1.8;color:var(--txt);font-family:var(--en)}
.lesta{font-size:13px;line-height:1.9;color:var(--txt2);font-family:var(--ta2);margin-top:5px}
/* PAGINATION */
.pgbar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.pgbtn{background:var(--gold);border:none;color:#080810;padding:6px 16px;font-size:9px;font-weight:700;font-family:var(--sans);cursor:pointer}
.pgbtn:disabled{background:var(--bg3);color:var(--txt3)}.pgi{font-size:9px;color:var(--txt2);font-family:var(--sans)}
/* MISC */
.empty{text-align:center;padding:52px 20px}.emico{font-size:44px;margin-bottom:14px;opacity:.18}
.emtxt{font-size:9px;letter-spacing:2px;color:var(--txt3);line-height:2.2;font-family:var(--sans)}
.ad{background:var(--bg2);border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);height:50px;display:flex;align-items:center;justify-content:center}
.adlbl{font-size:8px;color:var(--txt3);letter-spacing:2px;font-family:var(--sans)}.pb{padding-bottom:calc(var(--nav)+12px)}
</style>
</head>
<body>

<!-- ═══ LOADING SCREEN (Fix 2 + Fix 7) ═══ -->
<div id="ls">
  <img src="icon.png" class="ls-img" onerror="this.style.display='none'"/>
  <div class="ls-title">வேத வசனம்</div>
  <div class="ls-sub">HOLY BIBLE · TAMIL + ENGLISH</div>
  <div class="ls-track"><div class="ls-bar" id="ls-bar"></div></div>
  <div class="ls-msg" id="ls-msg">Loading…</div>
  <!-- Fix 7: error fallback -->
  <div class="ls-err" id="ls-err">
    ⚠ Data failed to load.<br/>
    Check that all bd_a.js – bd_f.js files<br/>are uploaded to public/data/
  </div>
</div>

<!-- ═══ PUSH NOTIFICATION BANNER ═══ -->
<div id="pn-banner">
  <div class="pn-inner">
    <div class="pn-ico">🔔</div>
    <div style="flex:1">
      <div class="pn-title" id="pn-title">Message</div>
      <div class="pn-body"  id="pn-body"></div>
    </div>
    <button class="pn-close" onclick="PN.dismiss()">✕</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <header id="hdr">
    <div class="hbrand">
      <!-- Fix 1: icon.png in public/ shown in header -->
      <img src="icon.png" class="hico" onerror="this.style.display='none'"/>
      <div>
        <div class="htit">வேத வசனம்</div>
        <div class="hsub" id="h-sub">LOADING…</div>
      </div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="lang-btn" onclick="App.cycleLang()">BI</button>
      <button class="hbtn" id="th-btn"   onclick="App.theme()">☀</button>
    </div>
  </header>

  <main id="main">
    <!-- HOME -->
    <div class="scr on" id="s-home">
      <div class="tg" id="home-tiles"></div>
      <div class="ad"><span class="adlbl">GOOGLE ADSENSE — SLOT 1</span></div>
      <div class="sh"><span class="sht">TODAY'S READING · இன்றைய வசனம்</span></div>
      <div id="home-vv" class="pb"></div>
    </div>
    <!-- VERSES -->
    <div class="scr" id="s-verses">
      <div class="ltog" id="v-ltog">
        <button onclick="SV.setLang('ta')">தமிழ்</button>
        <button onclick="SV.setLang('en')">English</button>
